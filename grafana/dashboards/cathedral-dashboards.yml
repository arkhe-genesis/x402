# grafana/dashboards/cathedral-dashboards.yml
apiVersion: 1

providers:
  - name: 'Cathedral Dashboards'
    orgId: 1
    folder: 'Cathedral ARKHE'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards