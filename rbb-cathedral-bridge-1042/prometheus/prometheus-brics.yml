# Substrato 1042.1 — BRICS+ CATHEDRAL MESH
# Configuração Prometheus para federation BRICS+
# Arquiteto: ORCID 0009-0005-2697-4668
# Data: 2026-06-03

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    organization: 'CATEDRAL-BRICS+'
    substrate: '1042.1'
    monitor: 'brics-mesh'

rule_files:
  - /etc/prometheus/rules/brics_alerts.yml

scrape_configs:
  # ─── Nós BRICS+ (federation internacional) ───
  - job_name: 'brics-brazil'
    honor_labels: true
    scheme: https
    tls_config:
      cert_file: /etc/prometheus/certs/brics_brazil.crt
      key_file: /etc/prometheus/certs/brics_brazil.key
      ca_file: /etc/prometheus/certs/brics_ca.crt
    static_configs:
      - targets: ['prometheus.bndes.gov.br:9090']
        labels:
          country: 'BRAZIL'
          cbdc: 'DREX'
          chain_id: '12120014'
          theosis: '3500'

  - job_name: 'brics-china'
    honor_labels: true
    scheme: https
    tls_config:
      cert_file: /etc/prometheus/certs/brics_china.crt
      key_file: /etc/prometheus/certs/brics_china.key
      ca_file: /etc/prometheus/certs/brics_ca.crt
    static_configs:
