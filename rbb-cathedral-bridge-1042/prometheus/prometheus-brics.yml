  # ─── Métricas locais da Catedral (BRICS+ mesh) ───
  - job_name: 'brics-mesh-local'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          node: 'brics-mesh-coordinator'
          substrate: '1042.1'

  # ─── Bridge BRICS+ (contract events) ───
  - job_name: 'brics-bridge-events'
    static_configs:
      - targets: ['localhost:9102']
        labels:
          contract: 'BRICS_Cathedral_Mesh'
          substrate: '1042.1'
    metrics_path: /metrics
    scrape_interval: 60s

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

# Remote write para dashboard unificado BRICS+
remote_write:
  - url: 'http://brics-dashboard.catedral:9200/api/v1/write'
    write_relabel_configs:
      - source_labels: [__name__]
        regex: 'brics_.*'
        action: keep
